# Nixpacks конфигурация для бэкенда БухАгент
# Tesseract OCR устанавливается через apt (надёжнее чем Nix для данного пакета)

[phases.setup]
aptPkgs = [
  "tesseract-ocr",
  "tesseract-ocr-rus",
  "tesseract-ocr-kir",
  "libtesseract-dev",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
